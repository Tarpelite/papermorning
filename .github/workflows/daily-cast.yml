# ============================================
# Paper Morning - 每日自动播报
# ============================================
# 
# 需要在 GitHub repo Settings > Secrets 中配置:
#   - DEEPSEEK_API_KEY   (如果用 DeepSeek)
#   - MINIMAX_API_KEY    (如果用 MiniMax)
#   - ANTHROPIC_API_KEY  (如果用 Claude)

name: Daily Paper Morning

on:
  schedule:
    # UTC 22:30 = 北京时间 06:30, 确保7点起床时音频已生成
    - cron: '30 22 * * *'
  workflow_dispatch:  # 支持手动触发 (调试用)

permissions:
  contents: write    # 需要 push 生成的文件回 repo

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Paper Morning
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py

      - name: Commit and push generated files
        run: |
          git config user.name "paper-morning-bot"
          git config user.email "bot@paper-morning"
          git add docs/
          git diff --staged --quiet || {
            git commit -m "🎙️ Paper Morning $(date +%Y-%m-%d)"
            git push
          }
