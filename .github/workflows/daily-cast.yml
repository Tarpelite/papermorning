# ============================================
# Paper Morning - 每日自动播报
# ============================================
#
# Secrets 配置:
#   - ANTHROPIC_API_KEY  (推荐, Claude生成质量最好)
#   - DEEPSEEK_API_KEY   (备选)
#   - MINIMAX_API_KEY    (备选)

name: Daily Paper Morning

on:
  schedule:
    # UTC 22:30 = 北京时间 06:30
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Paper Morning
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py

      - name: Commit and push
        run: |
          git config user.name "paper-morning-bot"
          git config user.email "bot@paper-morning"
          git add docs/
          git diff --staged --quiet || {
            git commit -m "🎙️ Paper Morning $(date +%Y-%m-%d)"
            git push
          }
