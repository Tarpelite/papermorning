# ============================================
# Paper Morning - 学术晨间播报配置
# ============================================

# --- 信息源配置 ---
sources:
  # HuggingFace Daily Papers (主数据源, 免费无需API key)
  huggingface:
    enabled: true
    api_url: "https://huggingface.co/api/daily_papers"
    max_papers: 50

  # arXiv API (补充数据源, 按关键词抓取你领域的最新论文)
  arxiv:
    enabled: true
    categories:
      - "cs.LG"
      - "cs.AI"
      - "physics.comp-ph"
      - "cs.NA"
    keywords:
      - "neural operator"
      - "PDE"
      - "foundation model"
      - "scientific computing"
      - "physics-informed"
      - "partial differential equation"
      - "AI for science"
      - "operator learning"
      - "diffusion model"
      - "world model"
    max_results: 30

# --- 内容生成配置 ---
content:
  num_papers: 5
  language: "zh-CN"
  style: "insight"          # insight | news_anchor | casual
  duration_minutes: 6       # 稍微加长, 留出分析空间

# --- LLM配置 ---
llm:
  provider: "minimax"        # 切换到 Claude
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-chat"
  minimax:
    base_url: "https://api.minimax.chat/v1"
    model: "MiniMax-M2.5"
  claude:
    base_url: "https://api.anthropic.com/v1"
    model: "claude-sonnet-4-20250514"

# --- 语音合成配置 ---
tts:
  engine: "edge-tts"
  voice: "zh-CN-XiaoxiaoNeural"   # 最稳定的中文女声
  rate: "-5%"
  volume: "+0%"
  pitch: "-2Hz"

# --- 背景音乐配置 ---
bgm:
  enabled: true
  file: "assets/bgm.mp3"         # 放一段循环BGM到这个路径
  intro_duration_ms: 2500         # 开头纯BGM时长
  outro_duration_ms: 3000         # 结尾纯BGM时长
  fade_duration_ms: 1500          # 渐变过渡时长
  body_volume_db: -22             # 正文期间BGM音量 (相对于原始, -22dB很轻柔)

# --- 发布配置 ---
publish:
  podcast_title: "Paper Morning - 学术晨间播报"
  podcast_description: "每天早上用5分钟, 听AI为你播报最值得关注的学术动态"
  podcast_author: "Paper Morning"
  podcast_language: "zh-cn"
  podcast_cover: "https://papermorning.pages.dev/cover.jpg"
  site_url: "https://papermorning.pages.dev"
  max_episodes: 30
